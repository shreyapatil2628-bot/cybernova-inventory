<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberNova — Inventory System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #050b14;
    --bg-panel: #0a1628;
    --bg-card: #0f1f38;
    --bg-input: #071020;
    --border: rgba(0,200,255,0.12);
    --border-hover: rgba(0,200,255,0.35);
    --accent: #00c8ff;
    --accent-dim: rgba(0,200,255,0.08);
    --accent-glow: rgba(0,200,255,0.2);
    --text-primary: #e8f4ff;
    --text-secondary: #6a8aaa;
    --text-muted: #3a5570;
    --success: #00e676;
    --danger: #ff4757;
    --warning: #ffa726;
    --radius: 12px;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* Glowing orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.15;
  }
  .orb-1 { width: 400px; height: 400px; background: #00c8ff; top: -100px; right: -100px; animation: float1 8s ease-in-out infinite; }
  .orb-2 { width: 300px; height: 300px; background: #0066ff; bottom: -80px; left: -80px; animation: float2 10s ease-in-out infinite; }

  @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px, 30px); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, -20px); } }

  /* Toast container */
  #toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }

  .toast {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    min-width: 280px;
    pointer-events: auto;
    transform: translateX(120%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(10px);
  }
  .toast.show { transform: translateX(0); }
  .toast.success { border-color: rgba(0,230,118,0.3); }
  .toast.error { border-color: rgba(255,71,87,0.3); }
  .toast.warning { border-color: rgba(255,167,38,0.3); }
  .toast-icon { font-size: 18px; }
  .toast.success .toast-icon { color: var(--success); }
  .toast.error .toast-icon { color: var(--danger); }
  .toast.warning .toast-icon { color: var(--warning); }

  /* Login card */
  .login-wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 24px;
    animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: var(--accent-dim);
    border: 1px solid var(--border-hover);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    position: relative;
    overflow: hidden;
  }

  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(0,200,255,0.2), transparent 70%);
  }

  .logo-icon svg {
    width: 32px;
    height: 32px;
    color: var(--accent);
  }

  .logo-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-family: var(--mono);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }

  .card-header {
    margin-bottom: 28px;
  }

  .card-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .card-header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* Form */
  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    transition: color 0.2s;
    pointer-events: none;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    height: 48px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 14px;
    padding: 0 42px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--accent);
  }

  input:focus {
    border-color: var(--border-hover);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  input:focus + .focus-line,
  .input-wrap:focus-within .input-icon {
    color: var(--accent);
  }

  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 0;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--accent); }

  /* Role selector */
  .role-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .role-btn {
    padding: 10px 16px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-secondary);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .role-btn.active {
    background: var(--accent-dim);
    border-color: var(--border-hover);
    color: var(--accent);
  }

  .role-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
  }
  .role-btn.active .role-dot { opacity: 1; }

  /* Submit button */
  .btn-login {
    width: 100%;
    height: 50px;
    background: linear-gradient(135deg, #0088cc, #00c8ff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  .btn-login:hover { opacity: 0.92; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-login .btn-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* SVG icons */
  svg { display: block; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div id="toast-container"></div>

<div class="login-wrapper">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="10" height="10" rx="2"/>
        <rect x="18" y="4" width="10" height="10" rx="2"/>
        <rect x="4" y="18" width="10" height="10" rx="2"/>
        <path d="M18 23h10M23 18v10"/>
      </svg>
    </div>
    <div class="logo-title">CyberNova</div>
    <div class="logo-sub">Inventory Management System</div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Welcome back</h2>
      <p>Sign in to access your inventory dashboard</p>
    </div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
        <div class="focus-line"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        <button class="eye-btn" id="eye-toggle" type="button" aria-label="Toggle password">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      <div class="btn-content">
        <span class="spinner" id="spinner"></span>
        <span id="btn-text">Sign In</span>
      </div>
    </button>

    <div class="status-bar">
      <span class="status-dot"></span>
      <span>SYSTEM SECURE &nbsp;·&nbsp; TLS 1.3</span>
    </div>
  </div>
</div>

<script>
  // Users (in production, authenticate server-side)
  const USERS = {
    admin: { password: 'admin123', role: 'Admin', name: 'Admin' },
    manager: { password: 'cyber2024', role: 'Manager', name: 'Manager' }
  };

  // Toast system
  function showToast(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    const icons = {
      success: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
      error: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
      warning: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      info: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
    };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span><span>${message}</span>`;
    container.appendChild(toast);
    requestAnimationFrame(() => { requestAnimationFrame(() => toast.classList.add('show')); });
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, duration);
  }

  // Eye toggle
  document.getElementById('eye-toggle').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      pwd.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  });

  // Enter key
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');

    if (!username) { showToast('Please enter your username', 'warning'); return; }
    if (!password) { showToast('Please enter your password', 'warning'); return; }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Authenticating...';

    await new Promise(r => setTimeout(r, 900));

    const user = USERS[username.toLowerCase()];
    if (user && user.password === password) {
      localStorage.setItem('cn_user', JSON.stringify({ username, name: user.name, role: user.role }));
      showToast(`Welcome back, ${user.name}!`, 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    } else {
      spinner.style.display = 'none';
      btn.disabled = false;
      btnText.textContent = 'Sign In';
      showToast('Invalid username or password', 'error');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }
</script>
</body>
</html>
